name: Deploy Docs

on:
  push:
    branches:
      - 'main'
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  # It will make it execute on P/Rs to main
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy-docs:
    runs-on: macos-26
    env:
      ADAENGINE_DISABLE_SWAN: "1"
    steps:
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '26.1.1'
      - uses: actions/checkout@v4
      - name: Build Documentation
        run: |
          swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --output-path ./docs \
            --transform-for-static-hosting \
            --enable-experimental-combined-documentation \
            --target AdaEngine \
            --target AdaECS \
            --target AdaRender \
            --target AdaUI \
            --target AdaApp \
            --target AdaPlatform \
            --target AdaAssets \
            --target AdaAudio \
            --target AdaTransform \
            --target AdaText \
            --target AdaInput \
            --target AdaScene \
            --target AdaTilemap \
            --target AdaPhysics \
            --target AdaSprite \
            --target AdaUtils \
            --target Math

      - name: Add custom domain and redirects
        run: |
          printf 'docs.adaengine.org\n' > docs/CNAME

          add_redirect() {
            local path="$1"
            local target="$2"

            mkdir -p "docs/$path"
            cat > "docs/$path/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=$target">
            <link rel="canonical" href="$target">
            <script>window.location.replace("$target");</script>
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="$target">$target</a>.</p>
          </body>
          </html>
          EOF
          }

          add_redirect "." "/documentation/adaengine/"
          add_redirect "adaengine" "/documentation/adaengine/"
          add_redirect "adaecs" "/documentation/adaecs/"
          add_redirect "adarender" "/documentation/adarender/"
          add_redirect "adaui" "/documentation/adaui/"
          add_redirect "adaapp" "/documentation/adaapp/"
          add_redirect "adaplatform" "/documentation/adaplatform/"
          add_redirect "adaassets" "/documentation/adaassets/"
          add_redirect "adaaudio" "/documentation/adaaudio/"
          add_redirect "adatransform" "/documentation/adatransform/"
          add_redirect "adatext" "/documentation/adatext/"
          add_redirect "adainput" "/documentation/adainput/"
          add_redirect "adascene" "/documentation/adascene/"
          add_redirect "adatilemap" "/documentation/adatilemap/"
          add_redirect "adaphysics" "/documentation/adaphysics/"
          add_redirect "adasprite" "/documentation/adasprite/"
          add_redirect "adautils" "/documentation/adautils/"
          add_redirect "math" "/documentation/math/"

      - name: Deploy to Github pages
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          token: ${{ secrets.DOCS_ACCESS_TOKEN }}
          repository-name: AdaEngine/adaengine-docs
          single-commit: true
          force: true
